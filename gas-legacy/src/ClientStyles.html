<style>
  :root {
    --sidebar-bg: #111827;
    --sidebar-elev: #1f2937;
    --sidebar-text: #e5e7eb;
    --sidebar-muted: #94a3b8;
    --content-bg: #f4f7fb;
    --panel-bg: #ffffff;
    --panel-border: #dbe3ef;
    --primary: #06b6d4;
    --primary-strong: #0891b2;
    --success: #16a34a;
    --warning: #f59e0b;
    --danger: #dc2626;
    --shadow-lg: 0 20px 60px rgba(15, 23, 42, 0.12);
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    font-family: 'Noto Sans Thai', sans-serif;
    color: #0f172a;
    background: radial-gradient(circle at 15% 20%, #dff7ff 0%, #edf2f9 35%, #f8fafc 100%);
  }

  .app-shell {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 280px 1fr;
    background: transparent;
  }

  .sidebar {
    position: sticky;
    top: 0;
    height: 100vh;
    background: linear-gradient(180deg, var(--sidebar-bg) 0%, #0b1220 100%);
    color: var(--sidebar-text);
    border-right: 1px solid rgba(148, 163, 184, 0.15);
    display: flex;
    flex-direction: column;
    z-index: 20;
  }

  .sidebar-top {
    min-height: 72px;
    border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255, 255, 255, 0.02);
    backdrop-filter: blur(8px);
  }

  .brand-chip {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    background: linear-gradient(135deg, #22d3ee, #0ea5e9);
    display: grid;
    place-items: center;
    color: #042f2e;
    box-shadow: 0 8px 20px rgba(6, 182, 212, 0.4);
  }

  .sidebar-nav {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .nav-btn {
    border: none;
    border-radius: 12px;
    background: transparent;
    color: var(--sidebar-text);
    width: 100%;
    text-align: left;
    padding: 12px 14px;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: all 160ms ease;
  }

  .nav-btn:hover {
    background: rgba(56, 189, 248, 0.12);
  }

  .nav-btn.active {
    background: linear-gradient(120deg, rgba(34, 211, 238, 0.24), rgba(14, 165, 233, 0.22));
    box-shadow: inset 0 0 0 1px rgba(125, 211, 252, 0.28);
  }

  .sidebar-bottom {
    margin-top: auto;
    border-top: 1px solid rgba(148, 163, 184, 0.18);
    padding: 14px;
    color: var(--sidebar-muted);
    font-size: 12px;
  }

  .content-wrap {
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 16px;
  }

  .topbar {
    min-height: 72px;
    background: rgba(255, 255, 255, 0.82);
    border: 1px solid rgba(219, 227, 239, 0.9);
    box-shadow: var(--shadow-lg);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    backdrop-filter: blur(10px);
  }

  .main-panel {
    background: rgba(255, 255, 255, 0.82);
    border: 1px solid rgba(219, 227, 239, 0.9);
    border-radius: 18px;
    box-shadow: var(--shadow-lg);
    padding: 18px;
    min-height: 420px;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 14px;
  }

  .metric-card {
    background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    border: 1px solid #d6e2f0;
    border-radius: 16px;
    padding: 14px;
  }

  .metric-card .label {
    font-size: 12px;
    color: #64748b;
  }

  .metric-card .value {
    margin-top: 8px;
    font-size: 26px;
    font-weight: 700;
  }

  .chat-shell {
    display: grid;
    grid-template-columns: 300px minmax(420px, 1fr) 320px;
    gap: 14px;
    min-height: calc(100vh - 170px);
  }

  .panel {
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    background: var(--panel-bg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-top {
    min-height: 72px;
    border-bottom: 1px solid var(--panel-border);
    padding: 0 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
  }

  .user-list {
    overflow: auto;
    flex: 1;
  }

  .user-item {
    border-bottom: 1px solid #edf2f7;
    padding: 10px 12px;
    cursor: pointer;
    transition: background 140ms ease;
    display: grid;
    grid-template-columns: 38px 1fr auto;
    gap: 10px;
    align-items: center;
  }

  .user-item:hover {
    background: #f8fbff;
  }

  .user-item.active {
    background: #ecfeff;
    box-shadow: inset 3px 0 0 #06b6d4;
  }

  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0ea5e9, #22d3ee);
    color: #083344;
    font-size: 13px;
    font-weight: 700;
    display: grid;
    place-items: center;
    overflow: hidden;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .chat-messages {
    flex: 1;
    overflow: auto;
    padding: 16px;
    background:
      radial-gradient(circle at right top, rgba(125, 211, 252, 0.18), transparent 50%),
      linear-gradient(180deg, #fcfdff 0%, #f3f8ff 100%);
  }

  .msg-row {
    margin-bottom: 10px;
    display: flex;
    gap: 8px;
  }

  .msg-row.admin,
  .msg-row.bot {
    justify-content: flex-end;
  }

  .msg-bubble {
    max-width: 72%;
    border: 1px solid #d4e2f0;
    border-radius: 14px;
    padding: 8px 10px;
    background: #fff;
    box-shadow: 0 4px 16px rgba(15, 23, 42, 0.06);
  }

  .msg-row.admin .msg-bubble {
    border-color: #67e8f9;
    background: linear-gradient(180deg, #ecfeff 0%, #cffafe 100%);
  }

  .msg-row.bot .msg-bubble {
    border-color: #bae6fd;
    background: linear-gradient(180deg, #f0f9ff 0%, #e0f2fe 100%);
  }

  .msg-meta {
    margin-top: 6px;
    font-size: 10px;
    color: #64748b;
  }

  .chat-composer {
    border-top: 1px solid var(--panel-border);
    padding: 10px;
    background: #ffffff;
    display: grid;
    gap: 8px;
  }

  .composer-tools {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .icon-btn,
  .btn,
  .btn-soft,
  .btn-danger {
    border-radius: 10px;
    border: 1px solid #d0dceb;
    background: #fff;
    padding: 8px 10px;
    cursor: pointer;
    font-size: 13px;
    transition: all 120ms ease;
  }

  .icon-btn:hover,
  .btn-soft:hover,
  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(15, 23, 42, 0.09);
  }

  .btn {
    background: linear-gradient(120deg, #06b6d4, #0ea5e9);
    border-color: #0891b2;
    color: #fff;
    font-weight: 600;
  }

  .btn-danger {
    background: #fee2e2;
    border-color: #fecaca;
    color: #991b1b;
  }

  textarea.composer-input {
    width: 100%;
    min-height: 58px;
    max-height: 200px;
    resize: vertical;
    border-radius: 12px;
    border: 1px solid #d0dceb;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
  }

  textarea.composer-input:focus,
  input.input:focus,
  select.input:focus {
    border-color: #38bdf8;
    box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
  }

  input.input,
  select.input {
    border-radius: 10px;
    border: 1px solid #d0dceb;
    padding: 8px 10px;
    font-size: 13px;
    min-height: 38px;
    outline: none;
  }

  .typing-indicator {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    background: #ffffff;
    border: 1px solid #d0dceb;
    border-radius: 12px;
    padding: 8px 10px;
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #38bdf8;
    animation: typing-bounce 0.9s infinite ease-in-out;
  }

  .typing-dot:nth-child(2) {
    animation-delay: 0.12s;
  }

  .typing-dot:nth-child(3) {
    animation-delay: 0.24s;
  }

  @keyframes typing-bounce {
    0%,
    80%,
    100% {
      transform: scale(0.7);
      opacity: 0.5;
    }
    40% {
      transform: scale(1);
      opacity: 1;
    }
  }

  .status-pill {
    border-radius: 999px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid;
  }

  .status-bot {
    color: #0f766e;
    background: #ccfbf1;
    border-color: #99f6e4;
  }

  .status-manual {
    color: #92400e;
    background: #fef3c7;
    border-color: #fde68a;
  }

  .table-wrap {
    overflow: auto;
    border: 1px solid #d7e0ec;
    border-radius: 12px;
  }

  table.data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    background: #fff;
  }

  table.data-table th,
  table.data-table td {
    padding: 10px;
    border-bottom: 1px solid #ecf2f8;
    text-align: left;
    vertical-align: top;
  }

  table.data-table th {
    color: #475569;
    background: #f8fafc;
    position: sticky;
    top: 0;
    z-index: 1;
  }

  .split-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .split-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }

  .section-card {
    border: 1px solid #d9e2ef;
    border-radius: 14px;
    padding: 14px;
    background: #fff;
  }

  .section-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .muted {
    color: #64748b;
    font-size: 12px;
  }

  .toast-container {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 60;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    min-width: 250px;
    max-width: 360px;
    border-radius: 12px;
    border: 1px solid #bae6fd;
    background: linear-gradient(120deg, #ecfeff, #eff6ff);
    box-shadow: 0 12px 28px rgba(15, 23, 42, 0.17);
    padding: 12px;
    animation: toast-in 180ms ease;
  }

  @keyframes toast-in {
    from {
      transform: translateY(-8px);
      opacity: 0;
    }
    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  .skeleton {
    position: relative;
    overflow: hidden;
    background: #e2e8f0;
    border-radius: 10px;
  }

  .skeleton::after {
    content: '';
    position: absolute;
    inset: 0;
    transform: translateX(-100%);
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.72), transparent);
    animation: shimmer 1.2s infinite;
  }

  @keyframes shimmer {
    100% {
      transform: translateX(100%);
    }
  }

  .blink-title {
    animation: blink-title 0.8s infinite;
  }

  @keyframes blink-title {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0.35;
    }
  }

  @media (max-width: 1320px) {
    .chat-shell {
      grid-template-columns: 260px 1fr 280px;
    }
  }

  @media (max-width: 1080px) {
    .app-shell {
      grid-template-columns: 92px 1fr;
    }

    .sidebar .brand-text,
    .sidebar .nav-label,
    .sidebar .role-info {
      display: none;
    }

    .chat-shell {
      grid-template-columns: 1fr;
      min-height: 600px;
    }

    .split-2,
    .split-3 {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 720px) {
    .app-shell {
      grid-template-columns: 1fr;
    }

    .sidebar {
      height: auto;
      position: static;
      border-right: none;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    }

    .content-wrap {
      padding: 12px;
    }

    .topbar,
    .main-panel {
      border-radius: 14px;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    * {
      animation: none !important;
      transition: none !important;
    }
  }
</style>
