<script>
  window.Store = {
    state: {
      page: window.__BOOTSTRAP__.page || 'intents',
      user: window.__BOOTSTRAP__.user || { isAuthorized: false },
      loading: false,

      intents: { items: [], loaded: false },
      editor: {
        isNew: true,
        previousKey: '',
        intent: '',
        match_type: 'exact',
        is_active: true,
        priority: 0,
        description: '',
        messages: []
      },
      preview: {
        text: '',
        result: null
      },
      histories: {
        tab: 'chats',
        chats: [],
        friends: [],
        loaded: false
      },
      flexPresets: []
    },
    listeners: [],
    set(patch) {
      this.state = { ...this.state, ...patch };
      this.emit();
    },
    update(path, value) {
      const keys = String(path).split('.');
      const root = { ...this.state };
      let ref = root;
      for (let i = 0; i < keys.length - 1; i += 1) {
        ref[keys[i]] = { ...ref[keys[i]] };
        ref = ref[keys[i]];
      }
      ref[keys[keys.length - 1]] = value;
      this.state = root;
      this.emit();
    },
    subscribe(handler) {
      this.listeners.push(handler);
      return () => {
        this.listeners = this.listeners.filter((x) => x !== handler);
      };
    },
    emit() {
      this.listeners.forEach((fn) => fn(this.state));
    }
  };
</script>
