<style>
  :root {
    --line-green: #06C755;
    --line-green-dark: #05a649;
  }
  html, body {
    font-family: 'Noto Sans Thai', system-ui, -apple-system, sans-serif;
  }
  [data-lucide] {
    width: 1em;
    height: 1em;
    vertical-align: -0.125em;
  }
  .line-bubble {
    background: #fff;
    border-radius: 14px;
    padding: 10px 14px;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
    max-width: 240px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .toast {
    pointer-events: auto;
    min-width: 240px;
    max-width: 360px;
    padding: 10px 14px;
    border-radius: 10px;
    background: #0F172A;
    color: #F1F5F9;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.15);
    font-size: 13px;
    animation: toastIn 180ms ease-out;
  }
  .toast.is-error {
    background: #7F1D1D;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .scroll-y {
    overflow-y: auto;
  }
  /* Hide scrollbars but keep scrollable content. */
  .scroll-y::-webkit-scrollbar { width: 8px; }
  .scroll-y::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
</style>
