<script>
  window.Api = {
    request(action, payload) {
      return new Promise((resolve, reject) => {
        const input = { action, payload: payload || {} };

        const handleResponse = (response) => {
          if (response && response.ok) {
            resolve(response.data);
            return;
          }
          reject(new Error((response && response.error) || 'Unknown API error'));
        };

        if (window.google && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler(handleResponse)
            .withFailureHandler((error) => {
              reject(new Error(error && error.message ? error.message : String(error)));
            })
            .apiDispatch(input);
          return;
        }

        const url = `${window.__BOOTSTRAP__.baseUrl}?route=api`;
        fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(input)
        })
          .then((res) => res.json())
          .then(handleResponse)
          .catch((err) => reject(err));
      });
    }
  };
</script>
